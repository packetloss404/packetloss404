name: Daily refresh

on:
  schedule:
    # 06:17 UTC every day — off-peak, non-round-number to dodge scheduler contention
    - cron: '17 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build banner + cards + README
        env:
          # gh CLI reads GH_TOKEN automatically
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/daily-build.js

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "no changes, exiting cleanly"
            exit 0
          fi
          git config user.name  "packetloss404-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(auto): daily refresh $(date -u +%Y-%m-%d)"
          git push
